<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0;url=https://bozo711.github.io/">
<title>B.A.M.</title>
<style>
body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#010008;color:#ffd8e0;font-family:monospace;letter-spacing:3px}
a{color:#f7c14b}
</style>
</head>
<body>
<p>BAM moved → <a href="https://bozo711.github.io/">bozo711.github.io</a></p>
<script>
// kill the old service worker + caches, then hand off to the real app
(async () => {
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
  } catch (e) {}
  location.replace('https://bozo711.github.io/');
})();
</script>
</body>
</html>
